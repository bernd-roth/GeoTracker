<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTracker - Analysis</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* ── Nav bar (floats top-centre over map) ───────────────── */
        #navBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 4px 16px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
        }
        .nav-link {
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-secondary);
            font-family: Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
        .nav-link:hover  { background: var(--hover-bg); color: var(--text-primary); }
        .nav-link.active { background: var(--accent-blue); color: #fff; }
        .nav-divider { width: 1px; height: 16px; background: var(--border-color); margin: 0 4px; }

        /* ── Session browser (left panel) ────────────────────────── */
        #sessionBrowser {
            max-height: calc(67vh - 20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sessionBrowser .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .search-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .search-row input,
        .search-row select {
            flex: 1;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        #sessionList { flex: 1; overflow-y: auto; }
        .load-more-btn {
            display: none;
            margin-top: 4px;
            padding: 5px;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 100%;
            flex-shrink: 0;
        }
        .load-more-btn:hover { background: var(--hover-bg); }
        .session-sport {
            display: inline-block;
            font-size: 9px;
            background: var(--accent-blue);
            color: #fff;
            border-radius: 3px;
            padding: 0 4px;
            margin-left: 4px;
            opacity: 0.85;
            font-weight: normal;
        }

        /* ── Summary panel (right, shown after session selected) ─── */
        #summaryPanel {
            position: absolute;
            top: 10px;
            right: 10px;
            left: auto;
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px var(--shadow-color);
            width: 280px;
            max-height: calc(67vh - 20px);
            font-family: Arial, sans-serif;
            display: none;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        #summaryPanel .panel-content {
            overflow-y: auto;
            padding: 4px 0;
        }
        #summaryPanel .stats-grid {
            padding: 6px;
        }
        .summary-footer {
            padding: 4px 10px 8px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: Arial, sans-serif;
        }

        /* ── Media section (inside summary panel) ────────────────── */
        .media-section {
            border-top: 1px solid var(--border-color);
            margin-top: 4px;
        }
        .media-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            font-family: Arial, sans-serif;
            user-select: none;
        }
        .media-section-header:hover { background: var(--hover-bg); }
        .media-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3px;
            padding: 4px 6px 8px;
        }
        .media-thumb {
            position: relative;
            aspect-ratio: 1;
            overflow: hidden;
            border-radius: 4px;
            cursor: pointer;
            background: var(--bg-secondary);
        }
        .media-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.15s;
        }
        .media-thumb:hover img { transform: scale(1.05); }
        .media-thumb .video-badge {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.35);
            color: white;
            font-size: 20px;
            pointer-events: none;
        }

        /* ── Lightbox ─────────────────────────────────────────────── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        #lbContent img, #lbContent video {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
            display: block;
        }
        #lbCaption {
            color: rgba(255,255,255,0.75);
            font-size: 12px;
            margin-top: 10px;
            font-family: Arial, sans-serif;
            text-align: center;
            max-width: 80vw;
        }
        .lb-nav {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.12);
            border: none;
            color: white;
            font-size: 36px;
            padding: 8px 16px;
            cursor: pointer;
            border-radius: 6px;
            z-index: 10000;
            line-height: 1;
        }
        .lb-nav:hover { background: rgba(255,255,255,0.25); }
        #lbPrev { left: 12px; }
        #lbNext { right: 12px; }
        #lbClose {
            position: fixed;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 32px;
            cursor: pointer;
            z-index: 10000;
            line-height: 1;
            padding: 4px 8px;
        }
        #lbClose:hover { color: white; }
        #lbCounter {
            position: fixed;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 11px;
            font-family: Arial, sans-serif;
            z-index: 10000;
        }

        /* ── Range stats panel ─────────────────────────────────────── */
        #rangeStatsPanel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10001;
            background: var(--bg-panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            box-shadow: 0 12px 48px rgba(0,0,0,0.25);
            width: 420px;
            max-width: 95vw;
            max-height: 85vh;
            display: none;
            flex-direction: column;
            overflow: hidden;
            font-family: Arial, sans-serif;
            color: var(--text-primary);
        }
        .range-stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 700;
            font-size: 14px;
        }
        .range-stats-close {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-secondary);
            line-height: 1;
            padding: 0 4px;
        }
        .range-stats-close:hover { color: var(--text-primary); }
        .range-stats-body {
            padding: 12px 16px 16px;
            overflow-y: auto;
        }
        .range-stats-overview {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .range-stat-card {
            background: var(--bg-secondary);
            border-radius: 8px;
            padding: 8px 10px;
            text-align: center;
        }
        .range-stat-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }
        .range-stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .range-stat-unit {
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 2px;
        }
        .range-stats-time {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }
        .range-stats-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }
        .range-stats-table th {
            text-align: center;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 4px 6px;
            border-bottom: 1px solid var(--border-color);
        }
        .range-stats-table th:first-child { text-align: left; }
        .range-stats-table td {
            padding: 4px 6px;
            text-align: center;
            border-bottom: 1px solid var(--border-light, rgba(0,0,0,0.05));
        }
        .range-stats-table td:first-child { text-align: left; }
    </style>
</head>
<body>

<!-- Navigation -->
<div id="navBar">
    <a href="/" class="nav-link">Live</a>
    <div class="nav-divider"></div>
    <a href="/analysis.html" class="nav-link active">Analysis</a>
    <div class="nav-divider"></div>
    <a href="/heatmap.html" class="nav-link">Heatmap</a>
    <div class="nav-divider"></div>
    <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
</div>

<!-- Left: session browser -->
<div id="sessionBrowser" class="control-panel">
    <div class="panel-header">
        <h3>Sessions</h3>
        <button id="toggleBrowserBtn" class="panel-toggle" onclick="toggleBrowser()" title="Collapse">-</button>
    </div>
    <div class="panel-content">
        <div class="search-row">
            <input id="searchInput" type="text" placeholder="Search name, sport, city..." oninput="applyFilter()" />
            <select id="sportFilter" onchange="applyFilter()">
                <option value="">All sports</option>
            </select>
        </div>
        <div id="sessionList">
            <p class="no-sessions">Loading...</p>
        </div>
        <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreSessions()">Load more</button>
        <div id="lapTableContainer"></div>
    </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom charts -->
<div class="charts-container">
    <div id="altitudeChartContainer">
        <canvas id="elevChart"></canvas>
    </div>
    <div id="speedChartContainer">
        <canvas id="spdChart"></canvas>
    </div>
</div>

<!-- Right: summary panel -->
<div id="summaryPanel">
    <div class="panel-header">
        <h3 id="summaryTitle">Summary</h3>
        <button class="panel-toggle" onclick="closeSummary()" title="Close">×</button>
    </div>
    <div class="panel-content">
        <div id="summaryContent"></div>
    </div>
</div>

<!-- Lightbox -->
<div id="lightbox" style="display:none" onclick="lightboxBackdropClick(event)">
    <button id="lbClose" onclick="event.stopPropagation(); closeLightbox()">×</button>
    <button id="lbPrev" class="lb-nav" onclick="event.stopPropagation(); lightboxNav(-1)">&#8249;</button>
    <div id="lbContent"></div>
    <button id="lbNext" class="lb-nav" onclick="event.stopPropagation(); lightboxNav(1)">&#8250;</button>
    <div id="lbCaption"></div>
    <div id="lbCounter"></div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
<script src="analysis.js"></script>
</body>
</html>
