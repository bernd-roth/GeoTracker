<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoTracker - Analysis</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        /* ── Nav bar (floats top-centre over map) ───────────────── */
        #navBar {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1001;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 4px 16px var(--shadow-color);
            display: flex;
            align-items: center;
            gap: 2px;
            padding: 4px 8px;
        }
        .nav-link {
            padding: 4px 14px;
            border-radius: 16px;
            font-size: 12px;
            font-weight: 500;
            text-decoration: none;
            color: var(--text-secondary);
            font-family: Arial, sans-serif;
            transition: background-color 0.2s, color 0.2s;
        }
        .nav-link:hover  { background: var(--hover-bg); color: var(--text-primary); }
        .nav-link.active { background: var(--accent-blue); color: #fff; }
        .nav-divider { width: 1px; height: 16px; background: var(--border-color); margin: 0 4px; }

        /* ── Session browser (left panel) ────────────────────────── */
        #sessionBrowser {
            max-height: calc(67vh - 20px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sessionBrowser .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .search-row {
            display: flex;
            gap: 4px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }
        .search-row input,
        .search-row select {
            flex: 1;
            padding: 4px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        #sessionList { flex: 1; overflow-y: auto; }
        .load-more-btn {
            display: none;
            margin-top: 4px;
            padding: 5px;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            color: var(--text-secondary);
            width: 100%;
            flex-shrink: 0;
        }
        .load-more-btn:hover { background: var(--hover-bg); }
        .session-sport {
            display: inline-block;
            font-size: 9px;
            background: var(--accent-blue);
            color: #fff;
            border-radius: 3px;
            padding: 0 4px;
            margin-left: 4px;
            opacity: 0.85;
            font-weight: normal;
        }

        /* ── Summary panel (right, shown after session selected) ─── */
        #summaryPanel {
            position: absolute;
            top: 10px;
            right: 10px;
            left: auto;
            z-index: 1000;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px var(--shadow-color);
            width: 280px;
            max-height: calc(67vh - 20px);
            font-family: Arial, sans-serif;
            display: none;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        #summaryPanel .panel-content {
            overflow-y: auto;
            padding: 4px 0;
        }
        #summaryPanel .stats-grid {
            padding: 6px;
        }
        .summary-footer {
            padding: 4px 10px 8px;
            font-size: 10px;
            color: var(--text-muted);
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<div id="navBar">
    <a href="/" class="nav-link">Live</a>
    <div class="nav-divider"></div>
    <a href="/analysis.html" class="nav-link active">Analysis</a>
    <div class="nav-divider"></div>
    <button id="themeBtn" class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9790;</button>
</div>

<!-- Left: session browser -->
<div id="sessionBrowser" class="control-panel">
    <div class="panel-header">
        <h3>Sessions</h3>
        <button id="toggleBrowserBtn" class="panel-toggle" onclick="toggleBrowser()" title="Collapse">-</button>
    </div>
    <div class="panel-content">
        <div class="search-row">
            <input id="searchInput" type="text" placeholder="Search name..." oninput="applyFilter()" />
            <select id="sportFilter" onchange="applyFilter()">
                <option value="">All sports</option>
            </select>
        </div>
        <div id="sessionList">
            <p class="no-sessions">Loading...</p>
        </div>
        <button id="loadMoreBtn" class="load-more-btn" onclick="loadMoreSessions()">Load more</button>
        <div id="lapTableContainer"></div>
    </div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Bottom charts -->
<div class="charts-container">
    <div id="altitudeChartContainer">
        <canvas id="elevChart"></canvas>
    </div>
    <div id="speedChartContainer">
        <canvas id="spdChart"></canvas>
    </div>
</div>

<!-- Right: summary panel -->
<div id="summaryPanel">
    <div class="panel-header">
        <h3 id="summaryTitle">Summary</h3>
        <button class="panel-toggle" onclick="closeSummary()" title="Close">×</button>
    </div>
    <div class="panel-content">
        <div id="summaryContent"></div>
    </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
<script src="analysis.js"></script>
</body>
</html>
